  <script>

    document.addEventListener('DOMContentLoaded', async function () {
      const loading = document.getElementById('__bundler_loading');
      function setStatus(msg) { if (loading) loading.textContent = msg; }

      // Error sink persists across replaceWith since it's on window, not the DOM.
      window.addEventListener('error', function (e) {
        var p = document.body || document.documentElement;
        var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
        d.id = '__bundler_err';
        d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
        d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
          '[bundle] ' + (e.message || e.type) +
          (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
      }, true);

      try {
        const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
        const templateEl = document.querySelector('script[type="__bundler/template"]');
        if (!manifestEl || !templateEl) {
          setStatus('Error: missing bundle data');
          console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
          return;
        }

        const manifest = JSON.parse(manifestEl.textContent);
        let template = JSON.parse(templateEl.textContent);

        const uuids = Object.keys(manifest);
        setStatus('Unpacking ' + uuids.length + ' assets...');

        const blobUrls = {};
        await Promise.all(uuids.map(async (uuid) => {
          const entry = manifest[uuid];
          try {
            const binaryStr = atob(entry.data);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

            let finalBytes = bytes;
            if (entry.compressed) {
              if (typeof DecompressionStream !== 'undefined') {
                const ds = new DecompressionStream('gzip');
                const writer = ds.writable.getWriter();
                const reader = ds.readable.getReader();
                writer.write(bytes);
                writer.close();
                const chunks = [];
                let totalLen = 0;
                while (true) {
                  const { done, value } = await reader.read();
                  if (done) break;
                  chunks.push(value);
                  totalLen += value.length;
                }
                finalBytes = new Uint8Array(totalLen);
                let offset = 0;
                for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
              } else {
                console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
              }
            }

            blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
          } catch (err) {
            console.error('Failed to decode asset ' + uuid + ':', err);
            blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
          }
        }));

        const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
        const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
        const resourceMap = {};
        for (const entry of extResources) {
          if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
        }

        setStatus('Rendering...');
        for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

        // Strip integrity + crossorigin — blob URLs from a file:// document inherit
        // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
        // The manifest bytes are ours; SRI protects against CDN compromise, not this.
        template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

        const resourceScript = '<script>window.__resources = ' +
          JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
          ';</' + 'script>';
        // Inject after <head> so the DOCTYPE stays first; prepending the script
        // would push the parser into quirks mode. DOMParser always emits a <head>
        // (synthesizing one if the source HTML omitted it) but may carry
        // attributes through, so match the full opening tag. slice() rather than
        // replace() keeps us clear of $-pattern substitution in resourceScript.
        const headOpen = template.match(/<head[^>]*>/i);
        if (headOpen) {
          const i = headOpen.index + headOpen[0].length;
          template = template.slice(0, i) + resourceScript + template.slice(i);
        }

        // Parse the template and swap the root element. Scripts inserted via
        // DOMParser/replaceWith are inert per spec — re-create each with
        // createElement so they execute, awaiting onload for src scripts to
        // preserve ordering (React before ReactDOM before Babel before text/babel).
        const doc = new DOMParser().parseFromString(template, 'text/html');
        document.documentElement.replaceWith(doc.documentElement);
        const dead = Array.from(document.scripts);
        for (const old of dead) {
          const s = document.createElement('script');
          for (const a of old.attributes) s.setAttribute(a.name, a.value);
          s.textContent = old.textContent;
          // text/babel scripts with a src: fetch and inline. transformScriptTags
          // does XHR against the src, but blob:null/ from a file:// origin is
          // silently dropped. Inlining makes it a plain inline babel script,
          // which transformScriptTags handles unconditionally.
          if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          }
          const p = s.src ? new Promise(function (r) { s.onload = s.onerror = r; }) : null;
          old.replaceWith(s);
          if (p) await p;
        }
        // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
        // which fired before we swapped the document. Trigger manually if present.
        if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
          window.Babel.transformScriptTags();
        }
      } catch (err) {
        setStatus('Error unpacking: ' + err.message);
        console.error('Bundle unpack error:', err);
      }
    });

-height:1.15; text-transform:uppercase; transform:rotate(-1deg); clip-path:polygon(0 6%,100% 0,100% 94%,0 100%);\">{{ question }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"text-align:center; margin:26px 16px 0;\">\n        <div style=\"font-family:'Anton',sans-serif; font-size:20px; letter-spacing:.04em; text-transform:uppercase; color:#0a0a0a;\">El amigo de mierda<\u002Fdiv>\n        <div style=\"font-family:'Anton',sans-serif; font-size:20px; letter-spacing:.04em; text-transform:uppercase; color:#ff0080;\">de esta ronda es...<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin:16px 16px 0; background:#ff0080; border:5px solid #0a0a0a; padding:22px 12px; text-align:center; transform:rotate(-1.5deg); box-shadow:7px 7px 0 #0a0a0a;\">\n        <div style=\"font-family:'Anton',sans-serif; font-size:64px; line-height:.9; color:#0a0a0a; text-transform:uppercase; letter-spacing:.02em;\">NACHO<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-weight:700; font-size:14px; letter-spacing:.1em; color:#0a0a0a; text-transform:uppercase;\">4 de 5 votos<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin:30px 16px 0; display:flex; justify-content:space-between; align-items:flex-end; gap:4px;\">\n        <div style=\"text-align:center; transform:rotate(18deg);\"><svg width=\"46\" height=\"46\" viewBox=\"0 0 64 64\" fill=\"#ff0080\"><path d=\"M30 8c-3 0-5 2-5 5v20l-6-4c-4-2-8 3-4 7l12 15c2 3 5 4 9 4h8c5 0 9-4 9-9V24c0-3-4-3-4 0v4c0-3-4-3-4 0v-2c0-3-4-3-4 0v-2c0-3-4-3-4 0V13c0-3-2-5-6-5z\"><\u002Fpath><\u002Fsvg><div style=\"font-family:'Permanent Marker',cursive; font-size:14px; margin-top:2px;\">Tú<\u002Fdiv><\u002Fdiv>\n        <div style=\"text-align:center; transform:rotate(8deg);\"><svg width=\"46\" height=\"46\" viewBox=\"0 0 64 64\" fill=\"#ff0080\"><path d=\"M30 8c-3 0-5 2-5 5v20l-6-4c-4-2-8 3-4 7l12 15c2 3 5 4 9 4h8c5 0 9-4 9-9V24c0-3-4-3-4 0v4c0-3-4-3-4 0v-2c0-3-4-3-4 0v-2c0-3-4-3-4 0V13c0-3-2-5-6-5z\"><\u002Fpath><\u002Fsvg><div style=\"font-family:'Permanent Marker',cursive; font-size:14px; margin-top:2px;\">Sole<\u002Fdiv><\u002Fdiv>\n        <div style=\"text-align:center; transform:rotate(-8deg);\"><svg width=\"46\" height=\"46\" viewBox=\"0 0 64 64\" fill=\"#ff0080\"><path d=\"M30 8c-3 0-5 2-5 5v20l-6-4c-4-2-8 3-4 7l12 15c2 3 5 4 9 4h8c5 0 9-4 9-9V24c0-3-4-3-4 0v4c0-3-4-3-4 0v-2c0-3-4-3-4 0v-2c0-3-4-3-4 0V13c0-3-2-5-6-5z\"><\u002Fpath><\u002Fsvg><div style=\"font-family:'Permanent Marker',cursive; font-size:14px; margin-top:2px;\">Mati<\u002Fdiv><\u002Fdiv>\n        <div style=\"text-align:center; transform:rotate(-18deg);\"><svg width=\"46\" height=\"46\" viewBox=\"0 0 64 64\" fill=\"#ff0080\"><path d=\"M30 8c-3 0-5 2-5 5v20l-6-4c-4-2-8 3-4 7l12 15c2 3 5 4 9 4h8c5 0 9-4 9-9V24c0-3-4-3-4 0v4c0-3-4-3-4 0v-2c0-3-4-3-4 0v-2c0-3-4-3-4 0V13c0-3-2-5-6-5z\"><\u002Fpath><\u002Fsvg><div style=\"font-family:'Permanent Marker',cursive; font-size:14px; margin-top:2px;\">Caro<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin:30px 16px 0;\">\n        <button onclick=\"{{ go_leaderboard }}\" style=\"width:100%; padding:18px; background:#0a0a0a; color:#fff; border:4px solid #0a0a0a; font-family:'Anton',sans-serif; font-size:24px; text-transform:uppercase; letter-spacing:.04em; cursor:pointer;\">Continuar<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isLeaderboard }}\">\n    <div data-screen-label=\"Ranking\">\n      <div style=\"padding:24px 16px 0;\">\n        <div style=\"font-family:'Anton',sans-serif; font-size:28px; line-height:1; text-transform:uppercase;\">Ranking de <span style=\"color:#ff0080;\">amigos de mierda<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-weight:700; font-size:11px; letter-spacing:.14em; color:#666; text-transform:uppercase; margin-top:14px;\">Puntos acumulados — primero a 5 gana<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin:20px 16px 0; border:4px solid #0a0a0a;\">\n        <div style=\"display:flex; background:#0a0a0a; color:#fff; font-family:'Anton',sans-serif; font-size:13px; letter-spacing:.06em; text-transform:uppercase;\">\n          <div style=\"flex:1; padding:10px 14px;\">Nombre de jugador<\u002Fdiv>\n          <div style=\"width:120px; padding:10px 14px; text-align:center; border-left:3px solid #ff0080;\">Cartas ganadas<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ ranking }}\" as=\"r\" hint-placeholder-count=\"6\">\n          <div style=\"{{ r.rowStyle }}\">\n            <div style=\"flex:1; padding:12px 14px; display:flex; align-items:center; gap:10px;\">\n              <sc-if value=\"{{ r.leader }}\"><div style=\"width:38px; height:38px; flex:0 0 auto; background:#0a0a0a; border-radius:50%; display:flex; align-items:center; justify-content:center;\"><svg width=\"24\" height=\"18\" viewBox=\"0 0 64 48\"><path d=\"M6 42 L12 12 L24 28 L32 8 L40 28 L52 12 L58 42 Z\" fill=\"none\" stroke=\"#ff0080\" stroke-width=\"4\"><\u002Fpath><path d=\"M5 42 H59\" stroke=\"#ff0080\" stroke-width=\"5\"><\u002Fpath><\u002Fsvg><\u002Fdiv><\u002Fsc-if>\n              <div style=\"font-family:'Permanent Marker',cursive; font-size:24px; line-height:1;\">{{ r.name }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"width:120px; padding:12px 14px; text-align:center; border-left:3px solid #0a0a0a; font-family:'Anton',sans-serif; font-size:30px; line-height:1; color:#ff0080;\">{{ r.cards }}<span style=\"font-size:14px; color:#999;\">/5<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"margin:28px 16px 0;\">\n        <button onclick=\"{{ go_gameover }}\" style=\"width:100%; padding:20px; background:#ff0080; color:#0a0a0a; border:4px solid #0a0a0a; font-family:'Anton',sans-serif; font-size:26px; text-transform:uppercase; letter-spacing:.04em; cursor:pointer; box-shadow:5px 5px 0 #0a0a0a;\">Continuar<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isGameover }}\">\n    <div data-screen-label=\"Fin\">\n      <div style=\"padding:26px 16px 0; text-align:center;\">\n        <svg width=\"120\" height=\"84\" viewBox=\"0 0 64 48\" style=\"display:block; margin:0 auto; animation:adm-pop .5s ease-out;\"><path d=\"M6 42 L12 10 L24 28 L32 6 L40 28 L52 10 L58 42 Z\" fill=\"none\" stroke=\"#ff0080\" stroke-width=\"3\"><\u002Fpath><path d=\"M5 42 H59\" stroke=\"#ff0080\" stroke-width=\"5\"><\u002Fpath><circle cx=\"12\" cy=\"10\" r=\"3\" fill=\"#ff0080\"><\u002Fcircle><circle cx=\"32\" cy=\"6\" r=\"3\" fill=\"#ff0080\"><\u002Fcircle><circle cx=\"52\" cy=\"10\" r=\"3\" fill=\"#ff0080\"><\u002Fcircle><\u002Fsvg>\n        <div style=\"font-family:'Anton',sans-serif; font-size:46px; line-height:.86; text-transform:uppercase; margin-top:14px; letter-spacing:-.01em;\">Has sido<br>coronado como<br><span style=\"color:#ff0080;\">amigo de mierda<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin:30px 16px 0; display:flex; align-items:flex-end; justify-content:center; gap:0;\">\n        <div style=\"width:30%; text-align:center;\">\n          <div style=\"font-family:'Permanent Marker',cursive; font-size:16px; margin-bottom:4px;\">Nacho<\u002Fdiv>\n          <div style=\"background:#0a0a0a; color:#fff; height:90px; display:flex; align-items:flex-start; justify-content:center; padding-top:8px; font-family:'Anton',sans-serif; font-size:30px; border:3px solid #0a0a0a;\">2<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:34%; text-align:center; transform:translateY(0);\">\n          <div style=\"font-family:'Permanent Marker',cursive; font-size:24px; color:#ff0080; margin-bottom:4px;\">Sole<\u002Fdiv>\n          <div style=\"background:#ff0080; color:#0a0a0a; height:140px; display:flex; align-items:flex-start; justify-content:center; padding-top:10px; font-family:'Anton',sans-serif; font-size:46px; border:4px solid #0a0a0a; box-shadow:0 0 0 4px #ff0080;\">1<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:30%; text-align:center;\">\n          <div style=\"font-family:'Permanent Marker',cursive; font-size:16px; margin-bottom:4px;\">Tú<\u002Fdiv>\n          <div style=\"background:#0a0a0a; color:#fff; height:70px; display:flex; align-items:flex-start; justify-content:center; padding-top:8px; font-family:'Anton',sans-serif; font-size:30px; border:3px solid #0a0a0a;\">3<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin:26px 16px 0; background:#0a0a0a; color:#fff; padding:18px 16px; text-align:center; font-weight:600; font-size:16px; line-height:1.3; text-transform:uppercase; clip-path:polygon(0 0,100% 5%,100% 100%,0 95%);\">La partida ha terminado. Un jugador ha ganado <span style=\"color:#ff0080; font-family:'Anton',sans-serif;\">5 cartas<\u002Fspan>.<\u002Fdiv>\n\n      <div style=\"margin:24px 16px 0; display:flex; flex-direction:column; gap:12px;\">\n        <button onclick=\"{{ go_lobby }}\" style=\"width:100%; padding:18px; background:#ff0080; color:#0a0a0a; border:4px solid #0a0a0a; font-family:'Anton',sans-serif; font-size:24px; text-transform:uppercase; letter-spacing:.03em; cursor:pointer; box-shadow:5px 5px 0 #0a0a0a;\">Revancha · misma sala<\u002Fbutton>\n        <button onclick=\"{{ go_index }}\" style=\"width:100%; padding:18px; background:#fff; color:#0a0a0a; border:4px solid #0a0a0a; font-family:'Anton',sans-serif; font-size:24px; text-transform:uppercase; letter-spacing:.03em; cursor:pointer;\">Salir al menú<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- more-screens -->\n\n  <\u002Fdiv>\n\n  <div style=\"position:fixed; left:0; right:0; bottom:0; z-index:40; max-width:480px; margin:0 auto; display:flex; background:#0a0a0a; border-top:4px solid #ff0080;\">\n    <sc-for list=\"{{ navItems }}\" as=\"tab\" hint-placeholder-count=\"6\">\n      <button onclick=\"{{ tab.go }}\" style=\"{{ tab.style }}\">{{ tab.label }}<\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:480,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { screen: 'index', join: '', vote: null, voted: false };\n\n  go(s) { this.setState({ screen: s, voted: false }); try { window.scrollTo(0, 0); } catch(e){} }\n\n  renderVals() {\n    const s = this.state.screen;\n    const players = ['Tú', 'Nacho', 'Sole', 'Mati', 'Caro', 'Bruno'];\n\n    const nav = [\n      { id: 'index', label: 'Inicio' },\n      { id: 'lobby', label: 'Lobby' },\n      { id: 'game', label: 'Juego' },\n      { id: 'results', label: 'Votos' },\n      { id: 'leaderboard', label: 'Ranking' },\n      { id: 'gameover', label: 'Fin' },\n    ];\n    const navItems = nav.map(n => {\n      const active = s === n.id;\n      return {\n        label: n.label,\n        go: () => this.go(n.id),\n        style: `flex:1; min-width:0; padding:11px 2px 9px; background:transparent; border:none; border-top:4px solid ${active ? '#ff0080' : 'transparent'}; margin-top:-4px; color:${active ? '#ff0080' : '#777'}; font-family:'Oswald',sans-serif; font-weight:700; font-size:11px; letter-spacing:.06em; text-transform:uppercase; cursor:pointer;`,\n      };\n    });\n\n    const baseVote = \"display:flex; align-items:center; justify-content:center; text-align:center; padding:18px 6px; font-family:'Anton',sans-serif; font-size:21px; letter-spacing:.03em; text-transform:uppercase; border:3px solid #0a0a0a; cursor:pointer; line-height:1;\";\n    const voteItems = players.map(p => {\n      const sel = this.state.vote === p;\n      return {\n        name: p,\n        pick: () => this.setState({ vote: p }),\n        style: baseVote + `background:${sel ? '#ff0080' : '#fff'}; color:#0a0a0a; transform:rotate(${sel ? '-1.5deg' : '0deg'}); box-shadow:${sel ? '4px 4px 0 #0a0a0a' : 'none'};`,\n      };\n    });\n\n    const lobbyPlayers = [\n      { name: 'Tú', host: true },\n      { name: 'Nacho', host: false },\n      { name: 'Sole', host: false },\n      { name: 'Mati', host: false },\n      { name: 'Caro', host: false },\n    ].map((p, i) => ({ ...p, posLabel: String(i + 1) }));\n\n    const ranking = [\n      { name: 'Sole', cards: 4 },\n      { name: 'Nacho', cards: 3 },\n      { name: 'Tú', cards: 2 },\n      { name: 'Caro', cards: 1 },\n      { name: 'Mati', cards: 1 },\n      { name: 'Bruno', cards: 0 },\n    ].map((r, i) => ({\n      ...r, pos: i + 1, leader: i === 0,\n      rowStyle: `display:flex; align-items:stretch; border-top:3px solid #0a0a0a; background:${i === 0 ? '#ececec' : '#fff'};`,\n    }));\n\n    return {\n      isIndex: s === 'index', isLobby: s === 'lobby', isGame: s === 'game',\n      isResults: s === 'results', isLeaderboard: s === 'leaderboard', isGameover: s === 'gameover',\n      navItems,\n      go_lobby: () => this.go('lobby'),\n      go_game: () => this.go('game'),\n      go_results: () => this.go('results'),\n      go_leaderboard: () => this.go('leaderboard'),\n      go_gameover: () => this.go('gameover'),\n      go_index: () => this.go('index'),\n      join: this.state.join,\n      on_join: (e) => this.setState({ join: (e.target.value || '').toUpperCase().slice(0, 4) }),\n      voteItems,\n      voteReady: this.state.vote !== null,\n      voteNotReady: this.state.vote === null,\n      voteName: this.state.vote || '',\n      castVote: () => this.go('results'),\n      lobbyPlayers,\n      ranking,\n      question: '¿Quién es más probable que termine en la cárcel?',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
